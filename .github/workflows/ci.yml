name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# 允许 sync-pipeline job 提交回仓库
permissions:
  contents: write

env:
  NODE_VERSION: '22'
  npm_config_msvs_version: '2022'

jobs:
  # 引用可复用测试工作流 — 唯一真相来源
  tests:
    name: All Tests
    uses: ./.github/workflows/_test.yml

  # 🔴 管线数据自动同步 — 所有测试通过后自动更新管线文件
  sync-pipeline:
    name: Sync Pipeline Data
    needs: tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Download vitest reports
        uses: actions/download-artifact@v4
        with:
          path: docs/pipeline
          merge-multiple: true
      - name: Run unified sync
        run: node scripts/unified-sync.mjs
      - name: Commit pipeline data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/pipeline/
          if git diff --cached --quiet; then
            echo "No pipeline data changes to commit"
          else
            git commit -m "ci: auto-sync pipeline data [skip ci]"
            # 防止 commit 后 hooks 产生 unstaged 残留阻塞 rebase
            git stash
            # 尝试 rebase；若并行 CI 同时修改了管线文件则可能冲突
            if git pull --rebase origin main; then
              git stash pop 2>/dev/null || true
            else
              # 冲突恢复策略：管线文件均为 unified-sync 全量生成，
              # 重置到远程最新 → 用本轮测试报告重新生成 → 提交推送
              echo "⚠️ Rebase conflict detected, resetting and re-syncing..."
              git rebase --abort 2>/dev/null || true
              git stash drop 2>/dev/null || true
              git reset --hard origin/main
              # 重新生成管线数据（下载的测试报告在 docs/pipeline/ 中不受 reset 影响）
              node scripts/unified-sync.mjs
              git add docs/pipeline/
              if git diff --cached --quiet; then
                echo "No changes after re-sync"
              else
                git commit -m "ci: auto-sync pipeline data [skip ci]"
              fi
            fi
            git push
            echo "✅ Pipeline data synced and pushed"
          fi
