name: CI Test

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Test with pnpm
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Echo test
        run: echo "pnpm setup succeeded"
