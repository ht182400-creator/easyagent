name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# 允许 sync-pipeline job 提交回仓库
permissions:
  contents: write

env:
  NODE_VERSION: '20'
  npm_config_msvs_version: '2022'

jobs:
  test-core:
    name: Test Core
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build core
        run: cd packages/core && npx tsup --dts
      - name: Run core tests
        run: cd packages/core && npx vitest run
      - name: Upload vitest report
        uses: actions/upload-artifact@v4
        with:
          name: vitest-core
          path: docs/pipeline/_vitest-core.json
          if-no-files-found: error

  test-server:
    name: Test Server
    needs: test-core
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build core
        run: cd packages/core && npx tsup --dts
      - name: Build server
        run: cd packages/server && npx tsup
      - name: Run server tests
        run: cd packages/server && npx vitest run
      - name: Upload vitest report
        uses: actions/upload-artifact@v4
        with:
          name: vitest-server
          path: docs/pipeline/_vitest-server.json
          if-no-files-found: error

  test-desktop:
    name: Test Desktop
    needs: test-core
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build core + frontend
        run: |
          cd packages/core && npx tsup --dts
          cd ../frontend && npx vite build
      - name: Run desktop tests
        run: cd packages/desktop && npx vitest run
      - name: Upload vitest report
        uses: actions/upload-artifact@v4
        with:
          name: vitest-desktop
          path: docs/pipeline/_vitest-desktop.json
          if-no-files-found: error

  coverage:
    name: Coverage Gate
    needs:
      - test-core
      - test-server
      - test-desktop
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build core + server
        run: |
          cd packages/core && npx tsup --dts
          cd ../server && npx tsup
      - name: Core coverage check
        run: cd packages/core && npx vitest run --coverage
      - name: Server coverage check (Desktop excluded - code in frontend pkg)
        run: cd packages/server && npx vitest run --coverage

  test-pipeline:
    name: Pipeline Tests
    needs: test-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Run pipeline tests
        run: node --test docs/pipeline/__tests__/pipeline-*.test.mjs

  build-check:
    name: Build Verification
    needs: test-core
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build all packages
        run: |
          cd packages/core && npx tsup --dts
          cd ../cli && npx tsup
          cd ../server && npx tsup
          cd ../desktop && npx tsup
          cd ../frontend && npx vite build
      - name: Verify build
        run: node packages/desktop/scripts/verify-build.cjs

  # 🔴 管线数据自动同步 — 所有测试通过后自动更新管线文件
  sync-pipeline:
    name: Sync Pipeline Data
    needs:
      - test-core
      - test-server
      - test-desktop
      - coverage
      - test-pipeline
      - build-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Download vitest reports
        uses: actions/download-artifact@v4
        with:
          path: docs/pipeline
          merge-multiple: true
      - name: Run unified sync
        run: node scripts/unified-sync.mjs
      - name: Commit pipeline data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/pipeline/test-case-mapping.json
          git add docs/pipeline/pipeline-data.json
          git add docs/pipeline/issue-data.json
          git add docs/pipeline/project-progress-data.json
          git add docs/pipeline/.pipeline-cache.json
          if git diff --cached --quiet; then
            echo "No pipeline data changes to commit"
          else
            git commit -m "ci: auto-sync pipeline data [skip ci]"
            git push
            echo "✅ Pipeline data synced and pushed"
          fi
