<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EasyAgent 项目进度管线 · 流程图</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0b0d12;--surface:#13161e;--border:#1e2330;--text:#c9d1d9;--text2:#8b949e;
    --done:#3fb950;--done-bg:rgba(63,185,80,.12);--progress:#58a6ff;--progress-bg:rgba(88,166,255,.12);
    --pending:#8b949e;--pending-bg:rgba(139,148,158,.08);--error:#f85149;--warn:#d2991d;
    --accent:#7c3aed;--accent2:#a78bfa;--glow:rgba(124,58,237,.6)}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);
    min-height:100vh;overflow-x:hidden}
  .header{padding:32px 40px 16px;text-align:center;position:relative;z-index:2}
  .header h1{font-size:32px;font-weight:700;background:linear-gradient(135deg,#a78bfa,#58a6ff);-webkit-background-clip:text;
    -webkit-text-fill-color:transparent;letter-spacing:-0.5px}
  .header .meta{color:var(--text2);font-size:14px;margin-top:6px}
  .pipeline-wrapper{position:relative;max-width:1600px;margin:0 auto;padding:0 20px 60px}
  svg.pipeline{width:100%;height:auto;display:block}

  /* ---- SVG 节点样式 ---- */
  .node-rect{stroke-width:1.5;transition:all .3s ease}
  .node-rect.done{fill:var(--done-bg);stroke:var(--done)}
  .node-rect.progress{fill:var(--progress-bg);stroke:var(--progress)}
  .node-rect.pending{fill:var(--pending-bg);stroke:var(--pending)}
  .node-rect.in-progress{fill:var(--progress-bg);stroke:var(--progress);animation:rectPulse 1.6s ease-in-out infinite}
  @keyframes rectPulse{0%,100%{stroke-opacity:1;stroke-width:2}50%{stroke-opacity:.35;stroke-width:2.8}}

  .node-icon{font-size:18px;text-anchor:middle;dominant-baseline:central}
  .node-label{font-size:13px;font-weight:600;fill:var(--text)}
  .node-desc{font-size:10.5px;fill:var(--text2);line-height:1.4}
  .node-badge{font-size:9px;font-weight:700;text-anchor:middle}
  .node-badge.done{fill:var(--done)}
  .node-badge.progress{fill:var(--progress)}
  .node-badge.pending{fill:var(--text2)}

  /* ---- 连接线动画 ---- */
  /* 主流程箭头：紫色实线虚线，从左向右流动（staged pipeline） */
  @keyframes dashFlow{to{stroke-dashoffset:-24}}
  /* 分支箭头：蓝点虚线，从顶部向下发散流动（branch out） */
  @keyframes branchFlow{to{stroke-dashoffset:24}}
  /* 分支底部快速脉冲箭头 */
  @keyframes branchPulse{0%,100%{stroke-dashoffset:0}50%{stroke-dashoffset:10}}
  @keyframes glowPulse{0%,100%{filter:drop-shadow(0 0 4px var(--glow))}50%{filter:drop-shadow(0 0 14px var(--glow))}}
  @keyframes statusBlink{0%,100%{opacity:1}50%{opacity:.4}}

  /* 主流程：紫色实心虚线，正向流动 */
  .flow-line{fill:none;stroke:var(--accent2);stroke-width:2.2;stroke-dasharray:10 4;animation:dashFlow 2s linear infinite}
  /* 主流程加固实线底色（视觉引导线） */
  .flow-line.solid{stroke-dasharray:none;stroke-width:1.5;opacity:.35;animation:none}
  /* 分支流程：蓝色散点虚线，反向发散 + 底部脉冲 */
  .flow-line.branch{fill:none;stroke:#58a6ff;stroke-width:1.6;stroke-dasharray:4 6;animation:branchFlow 2.4s linear infinite}
  .flow-line.branch-fast{fill:none;stroke:#58a6ff;stroke-width:1.3;stroke-dasharray:3 5;animation:branchPulse 1.4s ease-in-out infinite}

  .phase-label{font-size:11px;font-weight:700;fill:var(--accent2);text-anchor:middle;letter-spacing:1px;text-transform:uppercase}
  .phase-period{font-size:9px;fill:var(--text2);text-anchor:middle}

  /* ---- 当前任务闪烁 ---- */
  .current-glow{animation:glowPulse 2s ease-in-out infinite}
  .current-blink{animation:statusBlink 1.2s ease-in-out infinite}

  /* ---- 图例 ---- */
  .legend{display:flex;justify-content:center;gap:32px;padding:0 40px 20px;flex-wrap:wrap}
  .legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}
  .legend-dot{width:10px;height:10px;border-radius:3px}
  .legend-dot.done{background:var(--done)}
  .legend-dot.progress{background:var(--progress);animation:statusBlink 1.2s ease-in-out infinite}
  .legend-dot.pending{background:var(--pending);border:1px dashed var(--text2)}

  /* ---- 顶部仪表板 ---- */
  .dashboard{max-width:1600px;margin:0 auto 0;padding:0 20px}
  .dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;
    padding:0;margin-bottom:12px}
  .dash-card{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:12px;
    padding:14px 16px;text-align:center;transition:all .2s;overflow:hidden}
  .dash-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0}
  .dash-card.tests::before{background:linear-gradient(90deg,#3fb950,#58a6ff)}
  .dash-card.pass::before{background:linear-gradient(90deg,#3fb950,#7c3aed)}
  .dash-card.tools::before{background:linear-gradient(90deg,#58a6ff,#a78bfa)}
  .dash-card.models::before{background:linear-gradient(90deg,#a78bfa,#d2991d)}
  .dash-card.score::before{background:linear-gradient(90deg,#7c3aed,#f85149)}
  .dash-card.modes::before{background:linear-gradient(90deg,#56d364,#3fb950)}
  .dash-card.refresh::before{background:linear-gradient(90deg,#58a6ff,#3fb950)}
  .dash-card .dash-value{font-size:26px;font-weight:800;color:var(--text);line-height:1.1}
  .dash-card .dash-label{font-size:10px;color:var(--text2);margin-top:2px;letter-spacing:.5px}
  .dash-card .dash-sub{font-size:9px;color:var(--text2);margin-top:1px;opacity:.7}
  .dash-card:hover{border-color:var(--accent2);transform:translateY(-2px);box-shadow:0 4px 16px rgba(124,58,237,.15)}
  .dash-card{cursor:pointer}
  .dash-card:active{transform:translateY(0);box-shadow:none}
  /* 详情面板内的内容样式 */
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .detail-item{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
  .detail-item .key{font-size:11px;color:var(--text2);margin-bottom:4px}
  .detail-item .val{font-size:15px;font-weight:700;color:var(--text)}
  .detail-item.full{grid-column:1/-1}
  .detail-list{list-style:none;padding:0;margin:0}
  .detail-list li{padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;display:flex;justify-content:space-between;align-items:center}
  .detail-list li:last-child{border-bottom:none}
  .detail-list .li-label{color:var(--text);font-weight:500}
  .detail-list .li-val{color:var(--text2);font-size:12px}
  /* 可展开列表项 */
  .detail-list li.expandable{cursor:pointer;transition:background .15s,padding .15s;border-radius:6px;padding-left:8px;padding-right:8px;margin:0 -8px;flex-wrap:wrap}
  .detail-list li.expandable:hover{background:rgba(88,166,255,.08)}
  .detail-list li.expandable .item-row{display:flex;justify-content:space-between;align-items:center;width:100%}
  .detail-list .chevron{display:inline-block;width:16px;text-align:center;font-size:10px;transition:transform .25s;color:var(--text2);flex-shrink:0}
  .detail-list .chevron.open{transform:rotate(90deg)}
  .detail-list .sub-list{display:none;width:100%;padding:4px 0 4px 18px;margin-top:2px;list-style:none;border-top:1px dashed rgba(139,148,158,.12)}
  .detail-list .sub-list.open{display:block}
  .detail-list .sub-list li{padding:3px 0;border-bottom:1px dashed rgba(139,148,158,.1);font-size:11px;color:var(--text2);display:flex;justify-content:space-between}
  .detail-list .sub-list li:last-child{border-bottom:none}
  .detail-list .sub-list .sub-label{color:var(--text)}
  .detail-list .sub-list .sub-val{font-size:10px;opacity:.7}
  /* 深度下钻(三层) - 用例详情视图 */
  .drill-back{display:inline-flex;align-items:center;gap:6px;color:var(--accent2);cursor:pointer;font-size:12px;padding:4px 10px;border-radius:6px;margin-bottom:12px;transition:background .15s}
  .drill-back:hover{background:rgba(124,58,237,.1)}
  .drill-back .arr{font-size:14px}
  .drill-header{margin-bottom:12px}
  .drill-header h4{font-size:14px;color:var(--accent2);margin-bottom:4px}
  .drill-header .meta{font-size:11px;color:var(--text2)}
  .drill-header .meta .cnt{color:var(--accent2);font-weight:700}
  .case-list{list-style:none;padding:0;margin:0;max-height:420px;overflow-y:auto;scrollbar-width:thin}
  .case-list li{padding:8px 10px;border-bottom:1px dashed rgba(139,148,158,.1);font-size:11px;cursor:default}
  .case-list li:last-child{border-bottom:none}
  .case-list .case-header{display:flex;align-items:center;gap:6px;margin-bottom:3px}
  .case-list .case-id{font-size:9px;color:var(--text2);background:var(--surface);padding:1px 5px;border-radius:3px;min-width:22px;text-align:center}
  .case-list .case-name{color:var(--text);font-weight:500;font-family:'Consolas','Courier New',monospace;font-size:11px}
  .case-list .case-status{font-size:10px;flex-shrink:0;margin-left:auto}
  .case-list .case-desc{font-size:10px;color:var(--text2);margin-left:28px;line-height:1.4}
  .case-list .case-desc .vt{color:var(--progress)} /* 验证点 */
  .case-list .case-desc .vc{color:var(--done);margin-left:6px} /* 验证结果 */
  .detail-chart{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px;margin-top:12px}
  .detail-chart h4{font-size:13px;color:var(--accent2);margin-bottom:12px}

  /* 数据刷新指示器 */
  .refresh-badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;color:var(--text2)}
  .refresh-dot{width:6px;height:6px;border-radius:50%;background:var(--done);display:inline-block}
  .refresh-dot.stale{background:var(--warn)}

  /* ---- 响应式 ---- */
  @media(max-width:1200px){.pipeline-wrapper{padding:0 8px 40px}.header{padding:20px 16px 12px}.header h1{font-size:24px}}

  /* ---- 节点可点击 ---- */
  .node-group{cursor:pointer;transition:filter .2s}
  .node-group:hover{filter:brightness(1.15)}
  /* ---- 问题数量徽章 ---- */
  .issue-badge{font-size:9px;font-weight:700;fill:#c9d1d9;text-anchor:middle}

  /* ---- 右侧问题面板 ---- */
  .overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:90;
    opacity:0;pointer-events:none;transition:opacity .25s}
  .overlay.open{opacity:1;pointer-events:auto}
  .issue-panel{position:fixed;top:0;right:-520px;width:500px;max-width:92vw;height:100%;z-index:100;
    background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;
    transition:right .3s cubic-bezier(.4,0,.2,1);box-shadow:-8px 0 24px rgba(0,0,0,.4)}
  .issue-panel.open{right:0}
  .panel-hdr{position:sticky;top:0;z-index:5;background:var(--surface);border-bottom:1px solid var(--border);
    padding:20px 24px;display:flex;align-items:center;justify-content:space-between}
  .panel-hdr h3{font-size:18px;font-weight:700;color:var(--text);margin:0}
  .panel-hdr .sub{font-size:12px;color:var(--text2);margin-top:2px}
  .panel-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);
    background:transparent;color:var(--text2);font-size:16px;cursor:pointer;display:flex;
    align-items:center;justify-content:center;transition:all .15s}
  .panel-close:hover{background:var(--border);color:var(--text)}
  .panel-stats{display:flex;gap:0;border-bottom:1px solid var(--border)}
  .panel-stat{flex:1;text-align:center;padding:14px 8px}
  .panel-stat .val{font-size:22px;font-weight:700}
  .panel-stat .lbl{font-size:10px;color:var(--text2);margin-top:2px}
  .panel-stat.resolved .val{color:var(--done)}
  .panel-stat.unresolved .val{color:var(--warn)}
  .panel-body{padding:20px 24px}
  /* ---- 时间线条目 ---- */
  .timeline{position:relative;padding-left:28px}
  .timeline::before{content:'';position:absolute;left:11px;top:4px;bottom:4px;width:2px;
    background:linear-gradient(180deg,var(--accent2),#58a6ff)}
  .tl-entry{position:relative;margin-bottom:18px;padding:14px 16px;
    background:var(--bg);border:1px solid var(--border);border-radius:10px;transition:border-color .15s}
  .tl-entry:hover{border-color:var(--accent2)}
  .tl-entry::before{content:'';position:absolute;left:-22px;top:16px;width:10px;height:10px;
    border-radius:50%;background:var(--accent2);border:2px solid var(--surface)}
  .tl-date{font-size:10px;color:var(--text2);margin-bottom:4px;letter-spacing:.5px}
  .tl-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px}
  .tl-section{font-size:11.5px;color:var(--text2);margin-bottom:5px;line-height:1.5}
  .tl-section strong{color:#a78bfa;font-weight:600}
  .tl-section em{color:var(--warn);font-style:normal}
  .tl-section .ok{color:var(--done)}
  .no-issues{text-align:center;padding:40px 20px;color:var(--text2);font-size:14px}
  .no-issues .icon{font-size:40px;display:block;margin-bottom:12px}
</style>
</head>
<body>

<div class="header">
  <h1>EasyAgent 项目全景进度管线</h1>
  <div class="meta" id="headerMeta">版本 v0.4.0 · 代号 Gemini · 806 测试用例 · 10 家模型提供商 · 数据驱动自动更新</div>
</div>

<!-- 顶部仪表板 -->
<div class="dashboard">
  <div class="dash-grid">
    <div class="dash-card tests" onclick="openCardDetail('tests')">
      <div class="dash-value" id="dashTests">806</div>
      <div class="dash-label">测试用例总数</div>
      <div class="dash-sub">Vitest 全量测试</div>
    </div>
    <div class="dash-card pass" onclick="openCardDetail('pass')">
      <div class="dash-value" id="dashPass">100%</div>
      <div class="dash-label">测试通过率</div>
      <div class="dash-sub">0 失败 / 0 跳过</div>
    </div>
    <div class="dash-card tools" onclick="openCardDetail('tools')">
      <div class="dash-value" id="dashTools">51</div>
      <div class="dash-label">内置工具数</div>
      <div class="dash-sub">17 个功能分组</div>
    </div>
    <div class="dash-card models" onclick="openCardDetail('models')">
      <div class="dash-value" id="dashModels">10</div>
      <div class="dash-label">模型提供商</div>
      <div class="dash-sub">国产大模型全覆盖</div>
    </div>
    <div class="dash-card score" onclick="openCardDetail('score')">
      <div class="dash-value" id="dashScore">68.4</div>
      <div class="dash-label">综合评分/100</div>
      <div class="dash-sub">16/16 模块完成</div>
    </div>
    <div class="dash-card modes" onclick="openCardDetail('modes')">
      <div class="dash-value" id="dashModes">4</div>
      <div class="dash-label">操作模式</div>
      <div class="dash-sub">CLI/Web/Desktop/IM</div>
    </div>
    <div class="dash-card refresh" onclick="openCardDetail('issues')">
      <div class="dash-value" id="dashIssueCount">--</div>
      <div class="dash-label">问题记录</div>
      <div class="dash-sub" id="dashSource">等待加载...</div>
    </div>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><span class="legend-dot done"></span>已完成</div>
  <div class="legend-item"><span class="legend-dot progress"></span>进行中 / 当前焦点</div>
  <div class="legend-item"><span class="legend-dot pending"></span>待启动</div>
  <div class="legend-item"><span style="color:var(--accent2);font-size:16px">→</span> 主线流动箭头 (正向)</div>
  <div class="legend-item"><span style="color:#58a6ff;font-size:16px">→</span> 分支发散虚线 (反向)</div>
</div>

<div class="pipeline-wrapper">
  <svg class="pipeline" id="pipeline-svg" viewBox="0 0 1900 1120" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#7c3aed" flood-opacity="0.15"/></filter>
      <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0,8 3,0 6" fill="#a78bfa"/>
      </marker>
      <marker id="arrowhead-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0,8 3,0 6" fill="#58a6ff"/>
      </marker>
      <linearGradient id="trunkGrad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#58a6ff"/>
      </linearGradient>
    </defs>

    <!-- SVG 内容由 JS 动态生成 -->
    <g id="pipeline-content"></g>
  </svg>
</div>



<!-- 遮罩层 -->
<div class="overlay" id="overlay" onclick="closePanel()"></div>

<!-- 右侧问题详情面板 -->
<div class="issue-panel" id="issuePanel">
  <div class="panel-hdr">
    <div>
      <h3 id="panelTitle">模块问题详情</h3>
      <div class="sub" id="panelSub"></div>
    </div>
    <button class="panel-close" onclick="closePanel()" title="关闭">✕</button>
  </div>
  <div class="panel-stats">
    <div class="panel-stat resolved">
      <div class="val" id="statResolved">0</div>
      <div class="lbl">已解决</div>
    </div>
    <div class="panel-stat unresolved">
      <div class="val" id="statUnresolved">0</div>
      <div class="lbl">待解决</div>
    </div>
    <div class="panel-stat">
      <div class="val" id="statTotal">0</div>
      <div class="lbl">总计问题</div>
    </div>
  </div>
  <div class="panel-body" id="panelBody"></div>
</div>

// ============================================================
// 布局计算引擎
// ============================================================
const COL_W = 260;     // 节点卡片宽度
const NODE_H = 78;     // 节点卡片高度
const COL_GAP = 60;    // 列间距
const NODE_GAP = 18;   // 节点间垂直间距
const PHASE_HDR_H = 30;// 阶段标题高度
const TOP_MARGIN = 50;
const SVG_W = 1900;

function layout() {
  const phases = PIPELINE.phases;
  const nCols = phases.length;
  const totalColW = nCols * COL_W + (nCols - 1) * COL_GAP;
  const startX = (SVG_W - totalColW) / 2;

  // 阶段列布局
  const colCenters = phases.map((_,i) => startX + i * (COL_W + COL_GAP) + COL_W / 2);
  const maxNodes = Math.max(...phases.map(p => p.nodes.length));
  const mainAreaH = TOP_MARGIN + PHASE_HDR_H + maxNodes * (NODE_H + NODE_GAP);

  // 分支区域布局
  const branchStartY = mainAreaH + 40;
  const branches = PIPELINE.branches;
  const nBranches = branches.length;
  const branchTotalW = nBranches * COL_W + (nBranches - 1) * COL_GAP;
  const branchStartX = (SVG_W - branchTotalW) / 2;
  const branchColCenters = branches.map((_,i) => branchStartX + i * (COL_W + COL_GAP) + COL_W / 2);
  const maxBranchNodes = Math.max(...branches.map(b => b.nodes.length));
  const branchAreaH = maxBranchNodes * (NODE_H + NODE_GAP) - NODE_GAP;

  return {
    colCenters, maxNodes, mainAreaH, NODE_GAP, TOP_MARGIN, PHASE_HDR_H,
    branchColCenters, branchStartY, branchAreaH, maxBranchNodes,
    startX, startY: TOP_MARGIN + PHASE_HDR_H
  };
}

// ============================================================
// 渲染引擎
// ============================================================
function render() {
  const L = layout();
  const g = document.getElementById('pipeline-content');
  let html = '';

  // ---------- 背景网格 ----------
  html += `<rect x="0" y="0" width="${SVG_W}" height="1120" fill="none" stroke="#1e2330" stroke-width="0.5" stroke-dasharray="4 8" opacity="0.4"/>`;

  // ---------- 阶段间水平流动箭头 ----------
  PIPELINE.phases.forEach((phase, pi) => {
    if (pi === PIPELINE.phases.length - 1) return;
    const nextPhase = PIPELINE.phases[pi + 1];
    const srcX = L.colCenters[pi] + COL_W / 2;
    const dstX = L.colCenters[pi + 1] - COL_W / 2;
    const count = Math.max(phase.nodes.length, nextPhase.nodes.length);
    for (let r = 0; r < count; r++) {
      const y = L.startY + r * (NODE_H + L.NODE_GAP) + NODE_H / 2;
      // 底层：淡色实线作为视觉引导线，永远可见
      html += `<line x1="${srcX + 4}" y1="${y}" x2="${dstX - 4}" y2="${y}" class="flow-line solid"/>`;
      // 上层：紫色虚线流动箭头
      html += `<line x1="${srcX + 4}" y1="${y}" x2="${dstX - 4}" y2="${y}" class="flow-line"
        marker-end="url(#arrowhead)" opacity="0.6"/>`;
    }
  });

  // ---------- 节点 ----------
  PIPELINE.phases.forEach((phase, pi) => {
    const cx = L.colCenters[pi];
    const phaseHeaderY = L.TOP_MARGIN;

    // 阶段标题
    html += `<text x="${cx}" y="${phaseHeaderY}" class="phase-label">${phase.label}</text>`;
    html += `<text x="${cx}" y="${phaseHeaderY + 14}" class="phase-period">${phase.period}</text>`;

    // 阶段节点
    phase.nodes.forEach((node, ri) => {
      const nx = cx - COL_W / 2;
      const ny = L.startY + ri * (NODE_H + L.NODE_GAP);
      const isCurrent = node.status === 'in-progress';
      const cls = node.status === 'done' ? 'done' : node.status === 'in-progress' ? 'in-progress' : 'pending';
      const badge = node.status === 'done' ? '✅' : node.status === 'in-progress' ? '⏳' : '⬜';
      const glowFilter = isCurrent ? ' filter="url(#glow)"' : '';

      html += `<g${glowFilter} class="node-group ${isCurrent ? 'current-glow' : ''}" onclick="openPanel('${node.id}')" style="cursor:pointer">`;
      // 卡片背景
      html += `<rect x="${nx}" y="${ny}" width="${COL_W}" height="${NODE_H}" rx="10" class="node-rect ${cls}"/>`;
      // 图标
      html += `<text x="${nx + 28}" y="${ny + NODE_H / 2}" class="node-icon">${node.icon}</text>`;
      // 标签
      html += `<text x="${nx + 50}" y="${ny + 22}" class="node-label">${node.label}</text>`;
      // 问题数量徽章（左上角）
      html += `<text x="${nx + 12}" y="${ny + 14}" class="issue-badge" id="badge-${node.id}" style="display:none">0</text>`;
      // 描述（多行）
      node.desc.split('\n').forEach((line, li) => {
        html += `<text x="${nx + 50}" y="${ny + 38 + li * 14}" class="node-desc">${line}</text>`;
      });
      // 状态标记
      html += `<text x="${nx + COL_W - 18}" y="${ny + 14}" class="node-badge ${cls}" ${isCurrent ? 'class="node-badge progress current-blink"' : ''}>${badge}</text>`;
      html += `</g>`;
    });
  });

  // ---------- 主阶段到版本小结的连线 ----------
  const lastCol = PIPELINE.phases[PIPELINE.phases.length - 1];
  const lastCx = L.colCenters[L.colCenters.length - 1];
  const lastBotY = L.startY + lastCol.nodes.length * (NODE_H + L.NODE_GAP) - L.NODE_GAP + NODE_H;
  const summaryY = lastBotY + 40;
  const summaryX = SVG_W / 2;

  // 小结节点
  html += `<rect x="${summaryX - 100}" y="${summaryY}" width="200" height="60" rx="30" fill="#13161e" stroke="#7c3aed" stroke-width="2"/>`;
  html += `<text x="${summaryX}" y="${summaryY + 24}" text-anchor="middle" font-size="15" font-weight="700" fill="#a78bfa">v0.5.0 · 管线运维</text>`;
  html += `<text x="${summaryX}" y="${summaryY + 44}" text-anchor="middle" font-size="11" fill="#8b949e">73.4/100 · 19 个模块 · P5 进行中</text>`;

  // 从最后一个阶段到小结顶部的汇集连线（紫色弧线汇集到椭圆顶端）
  for (let r = 0; r < lastCol.nodes.length; r++) {
    const sy = L.startY + r * (NODE_H + L.NODE_GAP) + NODE_H / 2; // 从节点右侧中心出发
    const targetX = summaryX;       // 汇集到椭圆顶部中心
    const targetY = summaryY + 4;   // 稍微进入椭圆顶部
    const cpX = targetX;            // 控制点与目标点同 X，强制纵向汇入
    const cpY = sy + (targetY - sy) * 0.65; // 弯曲控制点
    html += `<path d="M ${lastCx + COL_W / 2} ${sy} Q ${cpX} ${cpY} ${targetX} ${targetY}"
      fill="none" stroke="#7c3aed" stroke-width="1.5" class="flow-line" opacity="0.5" marker-end="url(#arrowhead)"/>`;
  }

  // ---------- 分支管线 ----------
  const branchY = summaryY + 80;
  const branchHeaderY = branchY - 8;

  PIPELINE.branches.forEach((branch, bi) => {
    const bCx = L.branchColCenters[bi];
    const bNx = bCx - COL_W / 2;

    // 分支标题
    html += `<rect x="${bNx}" y="${branchHeaderY - 14}" width="${COL_W}" height="24" rx="6" fill="rgba(88,166,255,0.08)" stroke="#58a6ff" stroke-width="1"/>`;
    html += `<text x="${bCx}" y="${branchHeaderY + 2}" text-anchor="middle" font-size="11" font-weight="700" fill="#58a6ff">${branch.label}</text>`;

    // 从小结节点到分支的连线
    const branchConnY = branchHeaderY - 14;
    html += `<path d="M ${summaryX} ${summaryY + 60} L ${summaryX} ${branchY - 50} L ${bCx} ${branchY - 50} L ${bCx} ${branchConnY}"
      fill="none" stroke="#58a6ff" stroke-width="1.5" class="flow-line branch" marker-end="url(#arrowhead-blue)" opacity="0.7"/>`;

    // 分支节点
    branch.nodes.forEach((bnode, ri) => {
      const bny = branchY + ri * (NODE_H + L.NODE_GAP);
      const isCurrent = bnode.status === 'in-progress';
      const cls = bnode.status === 'done' ? 'done' : bnode.status === 'in-progress' ? 'in-progress' : 'pending';
      const badge = bnode.status === 'done' ? '✅' : bnode.status === 'in-progress' ? '⏳' : '⬜';
      const glowFilter = isCurrent ? ' filter="url(#glow)"' : '';

      html += `<g${glowFilter} class="node-group ${isCurrent ? 'current-glow' : ''}" onclick="openPanel('${bnode.id}')" style="cursor:pointer">`;
      html += `<rect x="${bNx}" y="${bny}" width="${COL_W}" height="${NODE_H}" rx="10" class="node-rect ${cls}"/>`;
      html += `<text x="${bNx + 28}" y="${bny + NODE_H / 2}" class="node-icon">${bnode.icon}</text>`;
      html += `<text x="${bNx + 48}" y="${bny + 22}" class="node-label">${bnode.label}</text>`;
      html += `<text x="${bNx + 12}" y="${bny + 14}" class="issue-badge" id="badge-${bnode.id}" style="display:none">0</text>`;
      bnode.desc.split('\n').forEach((line, li) => {
        html += `<text x="${bNx + 48}" y="${bny + 38 + li * 14}" class="node-desc">${line}</text>`;
      });
      html += `<text x="${bNx + COL_W - 18}" y="${bny + 14}" class="node-badge ${cls}" ${isCurrent ? 'class="node-badge progress current-blink"' : ''}>${badge}</text>`;
      html += `</g>`;

      // 分支内节点间连线
      if (ri > 0) {
        const prevY = branchY + (ri - 1) * (NODE_H + L.NODE_GAP) + NODE_H;
        html += `<line x1="${bCx}" y1="${prevY}" x2="${bCx}" y2="${bny}" class="flow-line branch" opacity="0.4"/>`;
      }
    });

    // 分支底部装饰箭头（蓝色脉冲，区别于主线紫色）
    const branchBotY = branchY + branch.nodes.length * (NODE_H + L.NODE_GAP) - L.NODE_GAP + NODE_H;
    html += `<line x1="${bCx}" y1="${branchBotY}" x2="${bCx}" y2="${branchBotY + 16}" class="flow-line branch-fast" marker-end="url(#arrowhead-blue)" opacity="0.5"/>`;
  });

  g.innerHTML = html;

  // 动态更新 SVG 高度
  const maxBranchHeight = Math.max(...PIPELINE.branches.map(b => b.nodes.length)) * (NODE_H + L.NODE_GAP);
  const totalH = branchY + maxBranchHeight + 40;
  document.getElementById('pipeline-svg').setAttribute('viewBox', `0 0 ${SVG_W} ${totalH}`);
}

// ============================================================
// 支持从 JSON 文件加载（HTTP 模式）或使用内嵌数据（file:// 模式）
// ============================================================
function init() {
  // 尝试从 pipeline-data.json 加载最新数据
  fetch('pipeline-data.json')
    .then(r => r.json())
    .then(data => {
      // 数据更新成功，重新构建管道数据
      console.log('[Pipeline] 从 pipeline-data.json 加载数据成功');
      renderWithData(data);
    })
    .catch(() => {
      // file:// 模式或网络不可用，使用内嵌数据
      console.log('[Pipeline] 使用内嵌数据（file:// 模式）');
      render();
    });
}

function renderWithData(data) {
  // 安全更新页面元数据
  const metaEl = document.getElementById('headerMeta');
  if (metaEl) {
    metaEl.textContent = `版本 v${data.meta.version} · 代号 ${data.meta.codename} · ${data.kpi.testCases} 测试用例 · ${data.kpi.providers} 家模型提供商 · P5管线运维进行中`;
  }

  // 更新顶部仪表板（安全取值）
  updateDash('dashTests', data.kpi.testCases);
  updateDash('dashPass', data.kpi.testPassRate + '%');
  updateDash('dashTools', data.kpi.tools);
  updateDash('dashModels', data.kpi.providers);
  updateDash('dashScore', data.kpi.scoreTotal);
  updateDash('dashModes', data.kpi.modes || 4);

  // 使用内嵌数据渲染
  render();
}

/** 安全更新仪表板数值 */
function updateDash(id, value) {
  const el = document.getElementById(id);
  if (el && value !== undefined && value !== null) {
    el.textContent = value;
  }
}

/** 打开卡片详情面板 */
function openCardDetail(cardId) {
  const detail = DASH_DETAILS[cardId];
  if (!detail) return;

  panelMode = 'card';
  currentModuleId = null;

  // 更新面板标题
  document.getElementById('panelTitle').textContent = detail.title;
  document.getElementById('panelSub').textContent = detail.subtitle;

  // 隐藏问题统计
  document.getElementById('statResolved').parentElement.style.display = 'none';
  document.getElementById('statUnresolved').parentElement.style.display = 'none';
  document.getElementById('statTotal').parentElement.style.display = 'none';

  const body = document.getElementById('panelBody');
  let html = '';

  // 通过率特殊样式：三色统计条
  if (cardId === 'pass' && detail.stats) {
    html += `<div class="detail-chart"><div style="display:flex;gap:12px;margin-bottom:16px">`;
    detail.stats.forEach(s => {
      html += `<div style="flex:1;text-align:center">
        <div style="font-size:28px;font-weight:800;color:${s.color}">${s.val}</div>
        <div style="font-size:10px;color:var(--text2);margin-top:2px">${s.label}</div>
      </div>`;
    });
    html += `</div><div style="background:var(--border);border-radius:4px;height:8px;overflow:hidden"><div style="width:100%;height:100%;background:linear-gradient(90deg,#3fb950,#238636);border-radius:4px"></div></div></div>`;
  }

  // 评分特殊样式：历史曲线 + 维度评分条
  if (cardId === 'score') {
    if (detail.history) {
      html += `<div class="detail-chart"><h4>📈 版本评分演进</h4><div style="display:flex;align-items:flex-end;gap:16px;height:120px;padding:0 8px">`;
      detail.history.forEach(h => {
        const hPct = (h.score / 100) * 100;
        html += `<div style="flex:1;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%">
          <div style="font-size:11px;font-weight:700;color:var(--accent2);margin-bottom:4px">${h.score}</div>
          <div style="width:32px;height:${hPct}%;background:linear-gradient(180deg,#a78bfa,#7c3aed);border-radius:6px 6px 0 0;min-height:4px"></div>
          <div style="font-size:9px;color:var(--text2);margin-top:6px">${h.version}<br>${h.date}</div>
        </div>`;
      });
      html += `</div></div>`;
    }
    if (detail.dimensions) {
      html += `<div class="detail-chart"><h4>📊 维度评分</h4>`;
      detail.dimensions.forEach(d => {
        const pct = Math.round((d.score / d.max) * 100);
        const color = pct >= 80 ? '#3fb950' : pct >= 50 ? '#d2991d' : '#f85149';
        html += `<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span style="color:var(--text)">${d.label}</span><span style="color:${color}">${d.score}/${d.max}</span></div>
        <div style="background:var(--border);border-radius:3px;height:6px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${color};border-radius:3px"></div></div>
        <div style="font-size:9px;color:var(--text2);margin-top:2px">${d.note}</div></div>`;
      });
      html += `</div>`;
    }
  }

  // 问题记录特殊处理：显示模块问题总览
  if (cardId === 'issues' && issueData) {
    const mods = issueData.modules;
    const modKeys = Object.keys(mods);
    html += `<div class="detail-chart"><h4>📋 各模块问题分布</h4><div class="detail-list">`;
    modKeys.forEach(mid => {
      const m = mods[mid];
      const total = m.issues.length;
      const resolved = m.issues.filter(i => i.status === 'resolved').length;
      if (total > 0) {
        html += `<li><span class="li-label">${m.name}</span><span class="li-val">${resolved}/${total} resolved · ${m.phase || '-'}</span></li>`;
      }
    });
    html += `</div></div>`;
    html += `<div style="text-align:center;padding:12px;color:var(--text2);font-size:12px;margin-top:8px">💡 点击流程图中任意模块节点查看具体问题与修复时间线</div>`;
  }

  // 通用详细列表（可展开）
  if (detail.items && detail.items.length > 0) {
    html += `<div class="detail-chart"><ul class="detail-list">`;
    detail.items.forEach((item, idx) => {
      const hasExpand = item.expandItems && item.expandItems.length > 0;
      const uid = `exp-${cardId}-${idx}`;
      if (hasExpand) {
        html += `<li class="expandable" onclick="toggleExpand('${uid}', event)">
          <div class="item-row"><span class="chevron" id="chev-${uid}">▶</span><span class="li-label">${item.label}</span><span class="li-val">${item.val}${item.note ? ' · ' + item.note : ''}</span></div>
          <ul class="sub-list" id="${uid}">`;
        item.expandItems.forEach(sub => {
          html += `<li><span class="sub-label">${sub.label}</span><span class="sub-val">${sub.val}</span></li>`;
        });
        html += `</ul></li>`;
      } else {
        html += `<li><span class="li-label">${item.label}</span><span class="li-val">${item.val}${item.note ? ' · ' + item.note : ''}</span></li>`;
      }
    });
    html += `</ul></div>`;
  }

  // 总结
  if (detail.summary) {
    html += `<div style="margin-top:12px;padding:12px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text2);line-height:1.6">${detail.summary}</div>`;
  }

  body.innerHTML = html;

  // 打开面板
  document.getElementById('issuePanel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

/** 加载问题数据：优先从 /api/issues 动态获取（HTTP模式），回退到 issue-data.json（file:// 模式） */
function loadIssueData() {
  const freshnessEl = document.getElementById('dashSource');
  const countEl = document.getElementById('dashIssueCount');

  // 第一优先级：API 动态解析（实时从 memory 目录读取）
  fetch('/api/issues')
    .then(r => {
      if (!r.ok) throw new Error('API HTTP ' + r.status);
      return r.json();
    })
    .then(data => {
      issueData = data;
      const total = data._totalIssues || 0;
      const cacheStats = data._cacheStats;
      console.log('[Issues] API 动态解析完成，共 ' + total + ' 个问题，数据时间: ' + (data._generatedAt || '未知'));
      if (countEl) countEl.textContent = total;
      // 显示缓存状态
      let freshnessHTML = '';
      if (cacheStats) {
        const hitRate = cacheStats.totalFiles > 0 ? Math.round((cacheStats.cacheHits / cacheStats.totalFiles) * 100) : 0;
        freshnessHTML = `<span class="refresh-dot live"></span> 实时 · 缓存命中率 ${hitRate}% (${cacheStats.cacheHits}/${cacheStats.totalFiles})`;
      } else {
        freshnessHTML = `<span class="refresh-dot live"></span> 实时 · ${(data._sourceFiles||[]).length}个源文件`;
      }
      if (freshnessEl) freshnessEl.innerHTML = freshnessHTML;
      setTimeout(updateAllBadges, 300);
    })
    .catch(err => {
      console.warn('[Issues] /api/issues 不可用 (' + err.message + ')，尝试回退到 issue-data.json');
      // 第二优先级：静态 JSON 文件
      fetch('issue-data.json')
        .then(r => r.json())
        .then(data => {
          issueData = data;
          const total = data._totalIssues || 0;
          console.log('[Issues] 从 issue-data.json 加载完成，共 ' + total + ' 个问题');
          if (countEl) countEl.textContent = total;
          if (freshnessEl) freshnessEl.innerHTML = `<span class="refresh-dot stale"></span> 快照 · ${data.meta?.exports || '历史'}导出`;
          setTimeout(updateAllBadges, 300);
        })
        .catch(() => {
          console.warn('[Issues] issue-data.json 也加载失败，问题面板不可用');
          if (countEl) countEl.textContent = '--';
          if (freshnessEl) freshnessEl.textContent = '数据源不可用';
        });
    });
}

/** 更新所有节点卡片上的问题数量徽章 */
function updateAllBadges() {
  if (!issueData) return;
  const modules = issueData.modules;
  for (const mid in modules) {
    const mod = modules[mid];
    const count = mod.issues.length;
    if (count > 0) {
      const badge = document.getElementById('badge-' + mid);
      if (badge) {
        badge.textContent = count + ' ↓';
        badge.style.display = '';
      }
    }
  }
}

/** 打开右侧问题面板（模块节点点击） */
function openPanel(moduleId) {
  if (!issueData) return;
  const mod = issueData.modules[moduleId];
  if (!mod) return;

  panelMode = 'module';
  currentModuleId = moduleId;
  const issues = mod.issues || [];
  const total = issues.length;
  const unresolved = issues.filter(i => i.status && i.status !== 'resolved').length;
  const resolved = total - unresolved;

  // 更新面板标题
  document.getElementById('panelTitle').textContent = mod.name;
  document.getElementById('panelSub').textContent = 'Phase ' + (mod.phase || '') + ' · ' + total + ' 个问题记录';

  // 显示问题统计
  document.getElementById('statResolved').parentElement.style.display = '';
  document.getElementById('statUnresolved').parentElement.style.display = '';
  document.getElementById('statTotal').parentElement.style.display = '';

  // 更新统计
  document.getElementById('statResolved').textContent = resolved;
  document.getElementById('statUnresolved').textContent = unresolved;
  document.getElementById('statTotal').textContent = total;

  // 渲染时间线
  const body = document.getElementById('panelBody');
  if (total === 0) {
    body.innerHTML = `<div class="no-issues"><span class="icon">📭</span>该模块暂无问题记录<br><span style="font-size:11px;color:var(--text2);margin-top:6px;display:block">开发过程顺利，未遇到需记录的问题</span></div>`;
  } else {
    let html = '<div class="timeline">';
    issues.forEach((issue, idx) => {
      const statusIcon = issue.status === 'pending' ? '⬜' : '✅';
      html += `<div class="tl-entry">`;
      html += `<div class="tl-date">${statusIcon} ${issue.date}</div>`;
      html += `<div class="tl-title">#${idx + 1} ${issue.title}</div>`;
      html += `<div class="tl-section"><strong>问题：</strong>${issue.problem}</div>`;
      html += `<div class="tl-section"><em>解决：</em><span class="ok">${issue.solution}</span></div>`;
      html += `</div>`;
    });
    html += '</div>';
    body.innerHTML = html;
  }

  // 打开面板
  document.getElementById('issuePanel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

/** 关闭右侧面板 */
function closePanel() {
  document.getElementById('issuePanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
  panelMode = 'module';
  currentModuleId = null;
}

/** 展开/折叠详情列表项的子内容 */
function toggleExpand(uid, event) {
  event.stopPropagation();
  const subList = document.getElementById(uid);
  const chev = document.getElementById('chev-' + uid);
  if (!subList || !chev) return;
  const isOpen = subList.classList.toggle('open');
  chev.classList.toggle('open', isOpen);
}

// 键盘 ESC 关闭面板
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closePanel();
  }
});
</script>
</body>
</html>
